{% extends "base.html" %}

{% block head %}
<title>Login - Sistem Kurikulum OBE</title>
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(220, 40%, 10%) 0%, hsl(220, 35%, 18%) 40%, hsl(211, 50%, 25%) 100%);
        position: relative;
        overflow: hidden;
    }
    .login-page::before {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, hsla(211, 61%, 50%, 0.12) 0%, transparent 70%);
        top: -100px;
        right: -100px;
        border-radius: 50%;
    }
    .login-page::after {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, hsla(230, 55%, 55%, 0.08) 0%, transparent 70%);
        bottom: -200px;
        left: -150px;
        border-radius: 50%;
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        background: hsla(0, 0%, 100%, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 20px 60px hsla(220, 40%, 10%, 0.3), 0 1px 0 hsla(0, 0%, 100%, 0.1) inset;
        padding: 2.5rem 2rem;
        position: relative;
        z-index: 1;
        animation: card-enter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes card-enter {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.625rem;
        margin-bottom: 0.5rem;
    }
    .login-brand-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, hsl(211, 61%, 50%) 0%, hsl(230, 55%, 55%) 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 0.875rem;
    }
    .login-title {
        font-size: 1.375rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.25rem;
        color: hsl(220, 26%, 14%);
        letter-spacing: -0.02em;
    }
    .login-subtitle {
        text-align: center;
        color: hsl(218, 11%, 55%);
        font-size: 0.8125rem;
        margin-bottom: 1.75rem;
        line-height: 1.5;
    }
    .login-btn {
        width: 100%;
        min-height: 44px;
        font-size: 0.9375rem;
        font-weight: 600;
        margin-top: 0.5rem;
        border-radius: 10px;
    }
    .login-error {
        background: hsl(0, 60%, 95%);
        color: hsl(0, 58%, 48%);
        padding: 0.5rem 0.875rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        margin-bottom: 1rem;
        display: none;
        border-left: 3px solid hsl(0, 58%, 48%);
    }
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.6875rem;
        color: hsl(218, 11%, 55%);
    }
</style>
{% endblock %}

{% block body %}
<div class="login-page">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-brand-icon">OBE</div>
        </div>
        <h1 class="login-title">Sistem Kurikulum OBE</h1>
        <p class="login-subtitle">Manajemen dan Pengukuran Kurikulum Berbasis Outcome</p>

        <div id="login-error" class="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-input" autocomplete="username" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" autocomplete="current-password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn">Masuk</button>
        </form>

        <div class="login-footer">
            LAMINFOKOM dan PiKoB-E LEDIK Alignment
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/core/api.js"></script>
<script src="/static/js/pages/login.js"></script>
{% endblock %}
