{% extends "base.html" %}

{% block body %}
<div class="app-layout">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">OBE</div>
            <span>Kurikulum OBE</span>
        </div>
        <div id="sidebar-menu"></div>
    </nav>

    <div class="main-content">
        <header class="app-header">
            <h2 class="header-title" id="page-title">Dashboard</h2>
            <div class="header-center" id="header-periode"></div>
            <div class="header-user">
                <span id="header-user-name"></span>
                <span id="header-user-role" class="badge badge-success"></span>
                <button class="btn btn-sm btn-outline" id="btn-logout">Keluar</button>
            </div>
        </header>

        <main class="page-content" id="page-content">
            <!-- Konten halaman di-render oleh JavaScript -->
        </main>
    </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-dialog" id="modal-dialog">
        <div class="modal-header">
            <h3 class="modal-title" id="modal-title"></h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
{% endblock %}
